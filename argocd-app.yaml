apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapi123
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yakovgrig/Webapi123-gitops.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crt-redhatshite-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
